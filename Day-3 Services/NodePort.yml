apiVersion : apps/v1
kind : Deployment
metadata : 
  name : mydeploy
  labels :
    type : frontend
spec : 
  replicas : 4
  selector :
    matchLabels : 
      type : frontend
  template :
    metadata :
      name : my-pod
      labels :
        type: frontend
    spec: 
      containers:
        - name : my-nginx
          image : nginx:latest

---
apiVersion : v1
kind : Service
metadata : 
  name: my-service
  labels : 
    type : frontend
    color : blue
spec : 
  type : NodePort
  ports :
    - targetPort : 80
    # By default and for convenience, the `targetPort` is set to
    # the same value as the `port` field.
      port : 80
      # Optional field
      # By default and for convenience, the Kubernetes control plane
      # will allocate a port from a range (default: 30000-32767)
      nodePort : 30965
  selector:
    type : frontend

